<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#151922">
  <meta name="description" content="תעשיידע — מערכת ניהול פעילויות חינוכיות">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="תעשיידע">

  <title>תעשיידע</title>
  <link rel="stylesheet" href="frontend/styles/main.css">
</head>
<body>

<!-- ── Login screen ──────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">תעשיידע</div>
    <div class="login-subtitle">מערכת ניהול פעילויות חינוכיות</div>
    <input
      id="login-code-input"
      type="text"
      inputmode="numeric"
      maxlength="10"
      placeholder="קוד כניסה"
      autocomplete="off"
      autofocus
    >
    <button class="btn btn--primary" id="login-btn">כניסה</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── App shell ─────────────────────────────────────────── -->
<div id="app" style="display:none;">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-logo">תעשיידע</div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-user"></div>
  </nav>
  <div id="sidebar-overlay"></div>

  <!-- Main -->
  <div id="main">
    <!-- Topbar -->
    <header id="topbar">
      <button id="btn-menu" aria-label="תפריט" onclick="window.__toggleMenu()">☰</button>
      <span id="topbar-title"></span>
      <div id="topbar-actions"></div>
    </header>

    <!-- Screen content -->
    <main id="screen-content"></main>
  </div>

</div>

<script type="module">
  import { boot } from "./frontend/app.js";
  import { login } from "./frontend/api/api.js";
  import { showToast } from "./frontend/shared/toast.js";

  // ── Login logic ────────────────────────────────────────
  const loginBtn   = document.getElementById("login-btn");
  const loginInput = document.getElementById("login-code-input");
  const loginError = document.getElementById("login-error");

  async function doLogin() {
    const code = loginInput.value.trim();
    if (!code) return;
    loginBtn.disabled = true;
    loginBtn.textContent = "...";
    loginError.textContent = "";

    try {
      const res = await login(code);
      if (res.user) {
        boot();
      } else {
        loginError.textContent = "קוד כניסה שגוי";
        loginInput.value = "";
        loginInput.focus();
      }
    } catch {
      loginError.textContent = "שגיאה בחיבור לשרת";
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "כניסה";
    }
  }

  loginBtn.addEventListener("click", doLogin);
  loginInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

  // ── Boot (if already logged in) ────────────────────────
  boot();

  // ── Mobile menu toggle ─────────────────────────────────
  window.__toggleMenu = function() {
    document.getElementById("sidebar").classList.toggle("open");
  };
  document.getElementById("sidebar-overlay")?.addEventListener("click", () => {
    document.getElementById("sidebar").classList.remove("open");
  });

  // ── Service Worker registration ────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>

</body>
</html>
