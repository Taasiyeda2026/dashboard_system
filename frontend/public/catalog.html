<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0;url=./?route=catalog" />
  <title>קטלוג תוכניות — מעבר למערכת</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f6f5f8;
      color: #2e2a33;
      text-align: center;
      direction: rtl;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #ddd4e7;
      border-radius: 14px;
      padding: 24px 20px;
    }
    h1 { margin: 0 0 8px; font-size: 1.25rem; }
    p { margin: 0 0 12px; color: #62576f; line-height: 1.6; }
    a { color: #5e3f80; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <h1>קטלוג תוכניות תשפ״ז</h1>
    <p>מעבירים אותך למסך הקטלוג במערכת הראשית…</p>
    <p><a id="catalog-link" href="./?route=catalog">לחצו כאן אם לא הועברתם אוטומטית</a></p>
  </div>
  <script>
    (function redirectToCatalogRoute() {
      const target = new URL('./?route=catalog', window.location.href);
      try { sessionStorage.setItem('dashboard_pending_route', 'catalog'); } catch (_) { /* ignore */ }
      const link = document.getElementById('catalog-link');
      if (link) link.href = target.href;
      window.location.replace(target.href);
    })();
  </script>
</body>
</html>
