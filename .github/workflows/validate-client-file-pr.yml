name: Validate unified client file

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/screens/proposals-agreements.js'
      - 'frontend/src/screens/instructors.js'
      - 'frontend/src/screens/instructor-contacts.js'
      - 'frontend/src/styles/**'
      - 'frontend/src/config.js'
      - 'frontend/sw.js'
      - 'sw.js'
      - 'index.html'
      - 'tests/client-file-*.test.mjs'
      - 'tests/proposals-agreements-screen.test.mjs'
      - 'tests/instructor-contacts-nav-access.test.mjs'
      - '.github/workflows/validate-client-file-pr.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check JavaScript syntax
        run: |
          node --check frontend/src/screens/proposals-agreements.js
          node --check frontend/src/screens/instructors.js
          node --check frontend/src/screens/instructor-contacts.js
          node --check frontend/src/main.js
          node --check frontend/src/api.js
          node --check tests/client-file-unified-screen.test.mjs
          node --check tests/client-file-version-sync.test.mjs
          node --check tests/instructor-contacts-nav-access.test.mjs

      - name: Run unified client file tests
        id: unified_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node --test tests/client-file-unified-screen.test.mjs 2>&1 | tee unified-client-file-tests.log

      - name: Upload unified test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-client-file-test-output
          path: |
            unified-client-file-tests.log
            tests/client-file-unified-screen.test.mjs
          if-no-files-found: error

      - name: Stop on unified test failure
        if: steps.unified_tests.outcome == 'failure'
        run: exit 1

      - name: Validate current cache and hotfix versions
        run: node --test tests/client-file-version-sync.test.mjs

      - name: Run instructor contacts navigation tests
        run: node --test tests/instructor-contacts-nav-access.test.mjs

      - name: Build production bundle
        run: npm run check:build

      - name: Check PWA cache guardrails
        run: npm run check:pwa
